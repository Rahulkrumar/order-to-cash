services:
  - type: web
    name: order-to-cash-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DB_PATH
        value: /tmp/otc.db
      - key: GROQ_API_KEY
        sync: false
